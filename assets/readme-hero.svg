<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111B31"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="80" x2="1260" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="760" rx="40" fill="url(#bg)"/>
  <circle cx="1180" cy="120" r="150" fill="#1D4ED8" fill-opacity="0.18"/>
  <circle cx="1120" cy="620" r="220" fill="#F59E0B" fill-opacity="0.10"/>
  <rect x="62" y="62" width="1276" height="636" rx="30" fill="#111827" stroke="#24324F" stroke-width="2"/>
  <text x="118" y="142" fill="#F8FAFC" font-size="58" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">leader-skill</text>
  <text x="118" y="192" fill="#9FB0D1" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif">领导圣意解析器 · Decode vague boss messages into real requirements, risks, and replies.</text>
  <text x="118" y="246" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">Three layers: Persona → Intent Map → Survival Playbook</text>
  <rect x="118" y="290" width="542" height="304" rx="26" fill="#0F172A" stroke="#263755" stroke-width="2"/>
  <text x="148" y="346" fill="#67E8F9" font-size="22" font-family="Consolas, monospace">$ python -m tools.cli translate --text "这个你先看一下，晚点我们再对齐。"</text>
  <text x="148" y="400" fill="#E2E8F0" font-size="23" font-family="Consolas, monospace">actual_meaning: not just a look-around; a request for an initial response</text>
  <text x="148" y="446" fill="#E2E8F0" font-size="23" font-family="Consolas, monospace">risk_points: priority and acceptance criteria are still fuzzy</text>
  <text x="148" y="492" fill="#E2E8F0" font-size="23" font-family="Consolas, monospace">reply: I’ll send a reviewable draft tonight and lock scope tomorrow</text>
  <rect x="718" y="290" width="564" height="304" rx="26" fill="#0B1120" stroke="url(#accent)" stroke-width="2"/>
  <text x="752" y="348" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif">What it gives you</text>
  <text x="752" y="402" fill="#C7D2FE" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">• actual meaning</text>
  <text x="752" y="448" fill="#C7D2FE" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">• hidden risks</text>
  <text x="752" y="494" fill="#C7D2FE" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">• safer replies</text>
  <text x="752" y="540" fill="#C7D2FE" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">• upward-management moves</text>
  <text x="118" y="650" fill="#F59E0B" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">First glance: meme. Second glance: useful. Third glance: send it to your teammate.</text>
</svg>
